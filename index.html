<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sherlock Holmes | Private Investigations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark-edge: #0a0a0b;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-edge);
            color: #e5e5e5;
            overflow-x: hidden;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* Эффект шума (пленки) */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 99;
            opacity: 0.05;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Виньетка */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 10;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        .gold-text {
            background: linear-gradient(to bottom, #f9e3ad 0%, #c5a059 50%, #8a6d3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .game-card {
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            filter: grayscale(0.4) brightness(0.8);
        }
        .game-card:hover {
            filter: grayscale(0) brightness(1.1);
            transform: scale(1.03) translateY(-10px);
            border-color: var(--gold);
        }

        /* Анимация появления контента */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 1s ease forwards; }
    </style>
</head>
<body>

    <div class="grain"></div>
    <div class="vignette"></div>

    <!-- ФОН (Динамический) -->
    <div id="master-bg" class="fixed inset-0 z-0 transition-all duration-1000 scale-105" 
         style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1518349619113-03114f06ac3a?q=80&w=2000'); background-size: cover; background-position: center;">
    </div>

    <!-- ГЛАВНЫЙ ИНТЕРФЕЙС -->
    <div id="main-ui" class="relative z-20 min-h-screen flex flex-col">
        
        <!-- Меню выбора -->
        <div id="menu-view" class="container mx-auto px-6 py-20 flex-1">
            <header class="text-center mb-24 animate-fade">
                <h1 class="text-7xl md:text-9xl font-black serif tracking-tighter gold-text mb-4 uppercase">
                    Sherlock
                </h1>
                <div class="flex items-center justify-center gap-4">
                    <div class="h-[1px] w-20 bg-yellow-600/50"></div>
                    <p class="text-sm tracking-[0.5em] uppercase text-yellow-500/80 font-light">The Victorian Mystery Chronicles</p>
                    <div class="h-[1px] w-20 bg-yellow-600/50"></div>
                </div>
            </header>

            <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                <!-- Карточки будут здесь -->
            </div>
        </div>

        <!-- Экран расследования -->
        <div id="game-view" class="hidden fixed inset-0 z-50 flex animate-fade">
            <div class="flex-1 flex flex-col glass-panel m-4 rounded-3xl overflow-hidden border border-white/5">
                <nav class="p-8 border-b border-white/5 flex justify-between items-center bg-black/20">
                    <button onclick="exitGame()" class="text-xs tracking-widest text-yellow-500/60 hover:text-yellow-500 transition uppercase">
                        ← Закрыть дело
                    </button>
                    <div class="flex gap-12">
                        <div class="text-center">
                            <span class="block text-[10px] uppercase text-gray-500 tracking-tighter">Время до тупика</span>
                            <span id="moves-label" class="text-3xl font-bold gold-text serif">0</span>
                        </div>
                        <div class="text-center">
                            <span class="block text-[10px] uppercase text-gray-500 tracking-tighter">Улики в портфеле</span>
                            <span id="clues-label" class="text-3xl font-bold text-white serif">0/5</span>
                        </div>
                    </div>
                </nav>

                <div class="flex-1 flex overflow-hidden">
                    <!-- Сцена -->
                    <div class="flex-[2] p-12 overflow-y-auto custom-scrollbar">
                        <div id="scene-img" class="w-full h-[400px] rounded-2xl mb-10 shadow-2xl border border-white/10 bg-cover bg-center transition-all duration-700"></div>
                        <h2 id="scene-title" class="text-5xl font-bold serif gold-text mb-6"></h2>
                        <p id="scene-desc" class="text-xl text-gray-300 leading-relaxed serif italic opacity-90 mb-12 max-w-3xl"></p>
                        
                        <div id="actions-grid" class="grid grid-cols-2 gap-6"></div>
                    </div>

                    <!-- Журнал -->
                    <div class="flex-1 border-l border-white/5 bg-black/30 p-10 flex flex-col">
                        <h3 class="text-xs uppercase tracking-[0.3em] text-yellow-600 mb-8 flex items-center">
                            <span class="w-2 h-2 bg-yellow-600 rounded-full mr-3 animate-pulse"></span>
                            Сводка Ватсона
                        </h3>
                        <div id="journal-logs" class="space-y-6 flex-1 overflow-y-auto pr-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cases = [
            { id: '1', title: 'The Hound', slug: 'baskerville', img: 'https://images.unsplash.com/photo-1505832018823-50331d70d237?q=80&w=1200', moves: 40, desc: 'На болотах Дартмура пробудилось древнее зло. Слышите этот вой, Ватсон?' },
            { id: '2', title: 'Blue Carbuncle', slug: 'blue', img: 'https://images.unsplash.com/photo-1543589077-47d81606c1bf?q=80&w=1200', moves: 30, desc: 'Рождественский гусь, старая шляпа и бесценный камень. Странное сочетание.' },
            { id: '3', title: 'Naval Treaty', slug: 'treaty', img: 'https://images.unsplash.com/photo-1510531704581-5b2870972060?q=80&w=1200', moves: 45, desc: 'Кража документа государственной важности. Британия на грани скандала.' },
            { id: '4', title: 'Silver Blaze', slug: 'silver', img: 'https://images.unsplash.com/photo-1553285991-4c74211f5097?q=80&w=1200', moves: 35, desc: 'Фаворит исчез перед самыми скачками. Собака почему-то молчала...' },
            { id: '5', title: 'Boscombe Valley', slug: 'boscombe', img: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1200', moves: 50, desc: 'Смерть у озера. Сын обвиняет отца, но следы говорят об ином.' },
            { id: '6', title: 'Engineer\'s Thumb', slug: 'thumb', img: 'https://images.unsplash.com/photo-1581092160562-40aa08e78837?q=80&w=1200', moves: 40, desc: 'Окровавленный инженер и гидравлический пресс. Дело пахнет порохом.' },
            { id: '7', title: 'Orange Pips', slug: 'pips', img: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1200', moves: 35, desc: 'Пять апельсиновых зернышек — смертный приговор из прошлого.' },
            { id: '8', title: 'Bohemia', slug: 'scandal', img: 'https://images.unsplash.com/photo-1533929736458-ca588d08c8be?q=80&w=1200', moves: 50, desc: 'Ирен Адлер. Единственная женщина, переигравшая великого Холмса.' },
            { id: '9', title: 'Musgrave Ritual', slug: 'ritual', img: 'https://images.unsplash.com/photo-1518709766631-a6a7f45921c3?q=80&w=1200', moves: 60, desc: 'Древний обряд скрывает нечто более ценное, чем просто традиции.' },
            { id: '10', title: 'Dying Detective', slug: 'dying', img: 'https://images.unsplash.com/photo-1505682634904-d7c8d95ccd50?q=80&w=1200', moves: 25, desc: 'Холмс при смерти. Или это величайший спектакль в его карьере?' }
        ];

        let gameState = { moves: 0, clues: 0, logs: [] };

        function renderMenu() {
            const container = document.getElementById('cards-container');
            container.innerHTML = cases.map((c, i) => `
                <div onclick="startInvestigation(${i})" class="game-card relative h-[500px] rounded-xl overflow-hidden border border-white/10 cursor-pointer group">
                    <div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-110" style="background-image: url('${c.img}')"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
                    <div class="absolute bottom-0 p-6">
                        <span class="text-[10px] uppercase tracking-widest text-yellow-600 mb-2 block font-bold">Case No. 0${c.id}</span>
                        <h3 class="text-2xl font-bold serif text-white group-hover:gold-text transition-colors">${c.title}</h3>
                    </div>
                    ${localStorage.getItem('case_'+c.slug) ? '<div class="absolute top-4 left-4 bg-yellow-600 text-black text-[10px] font-bold px-2 py-1 rounded">SOLVED</div>' : ''}
                </div>
            `).join('');
        }

        function startInvestigation(index) {
            const c = cases[index];
            gameState = { moves: c.moves, clues: 0, logs: ["Дело открыто. Мы прибыли на место."] };
            
            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('master-bg').style.backgroundImage = `url('${c.img}')`;
            
            updateGameUI(c);
        }

        function updateGameUI(c) {
            document.getElementById('moves-label').innerText = gameState.moves;
            document.getElementById('clues-label').innerText = `${gameState.clues}/5`;
            document.getElementById('scene-title').innerText = c.title;
            document.getElementById('scene-desc').innerText = c.desc;
            document.getElementById('scene-img').style.backgroundImage = `url('${c.img}')`;
            
            document.getElementById('journal-logs').innerHTML = gameState.logs.map(log => `
                <div class="text-sm border-l border-yellow-600/30 pl-4 py-1 text-gray-400 italic">
                    ${log}
                </div>
            `).join('');

            const actions = [
                { n: 'Осмотреть окрестности', cost: 3, msg: 'Замечены следы протекторов экипажа.' },
                { n: 'Допросить свидетеля', cost: 5, msg: 'Свидетель явно что-то недоговаривает.' },
                { n: 'Анализ улик', cost: 4, msg: 'Холмс нашел частицы табака редкого сорта.' },
                { n: 'Предъявить обвинение', cost: 10, win: true }
            ];

            document.getElementById('actions-grid').innerHTML = actions.map(a => `
                <button onclick="performAction('${a.msg}', ${a.cost}, ${a.win || false}, '${c.slug}')" 
                        class="p-6 rounded-xl border border-white/5 bg-white/5 hover:bg-yellow-600/10 hover:border-yellow-600/40 transition-all text-left group">
                    <span class="block text-xs text-yellow-600 uppercase mb-2">Затраты: ${a.cost} ч.</span>
                    <span class="text-white font-bold tracking-wide uppercase text-sm group-hover:text-yellow-500">${a.n}</span>
                </button>
            `).join('');
        }

        function performAction(msg, cost, isWin, slug) {
            if (gameState.moves < cost) {
                alert("Время вышло! Холмс признал поражение.");
                return exitGame();
            }
            gameState.moves -= cost;
            gameState.logs.unshift(msg);
            if(Math.random() > 0.6) gameState.clues++;

            if (isWin) {
                alert("Элементарно, Ватсон! Дело раскрыто.");
                localStorage.setItem('case_'+slug, 'true');
                return exitGame();
            }
            const currentCase = cases.find(c => c.slug === slug);
            updateGameUI(currentCase);
        }

        function exitGame() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
            document.getElementById('master-bg').style.backgroundImage = `url('https://images.unsplash.com/photo-1518349619113-03114f06ac3a?q=80&w=2000')`;
            renderMenu();
        }

        renderMenu();
    </script>
</body>
</html>
